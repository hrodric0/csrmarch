; =============================================================================
; CSMR Bare-Metal Inventory — K3s on 4 physical Ubuntu Server machines
; =============================================================================
; Topology (192.168.1.x /24 LAN, home lab):
;
;   vortex-0  (Ryzen 7 1700X, 8C/16T, 16GB)  -> K3s master (control plane),
;                                               CSMR proxy + load generator
;   vortex-1  (Core i7-2600K, 4C/8T, 32GB)   -> K3s worker, ZooKeeper,
;                                               Replica 0 (Paxos coordinator)
;   vortex-2  (Ryzen 5 1400,  4C/8T, 16GB)   -> K3s worker, Replica 1
;                                               (Paxos follower)
;   vortex-3  (Core i7-860,   4C/8T, 16GB)   -> K3s worker, Replica 2
;                                               (Paxos follower)
;
; SMR fault-tolerance boundary: f = 1 (per CLAUDE.md: formal invariant
;   ∀ x ∈ O : |R(x)| ≥ f + 1  -> each ring needs >= 2 replicas, 3 total).
; The 3 replicas (vortex-1/2/3) form each Paxos ring; vortex-0 hosts the
; stateless proxy/load-gen so it never participates in a quorum and can never
; break the |R(x)| >= 2 requirement.
; =============================================================================

[k3s_master]
vortex-0 ansible_host=192.168.1.139

[k3s_workers]
vortex-1 ansible_host=192.168.1.229
vortex-2 ansible_host=192.168.1.81
vortex-3 ansible_host=192.168.1.100

; -----------------------------------------------------------------------------
; Shared connection settings.
;   - ansible_user:   the default account on every box ('hrodrich'), which has
;                     passwordless sudo, so 'become' needs no password.
;   - ansible_ssh_common_args: an explicit ConnectTimeout + a known_hosts policy
;                     of 'accept-new' so the first run over passwordless SSH is
;                     non-interactive (new keys are auto-accepted, changed keys
;                     still warn). Adjust to 'no' only on a trusted LAN if you
;                     prefer fully silent runs.
;   - ansible_ssh_private_key_file: uncomment/set if the key is not the default
;                     ~/.ssh/id_rsa on the controller.
; -----------------------------------------------------------------------------
[k3s_master:vars]
ansible_user=hrodrich
ansible_become=yes
ansible_become_method=sudo
ansible_become_user=root
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null'
; ansible_ssh_private_key_file=~/.ssh/id_rsa

[k3s_workers:vars]
ansible_user=hrodrich
ansible_become=yes
ansible_become_method=sudo
ansible_become_user=root
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null'
; ansible_ssh_private_key_file=~/.ssh/id_rsa

; Apply the same SSH/connection defaults to every group as a safety net.
[all:vars]
ansible_user=hrodrich
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null'
