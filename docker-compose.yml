# =============================================================================
# docker-compose.yml — CSMR local development stack
#
# Brings up the full composition locally without Kubernetes.
# Useful for rapid iteration on the PoC before deploying to Minikube.
#
# Architecture (Docker Compose specific):
# - All services share the same Docker network
# - Sidecars communicate with apps via 127.0.0.1 (localhost)
# - Proxy routes to sidecars on port 9000
# - Sidecars communicate with each other via service names
#
# Usage:
#   docker compose up --build
#   curl -X POST http://localhost:8080/api/command \
#     -H 'Content-Type: application/json' \
#     -d '{"id":1,"method":"put","params":{"key":"hello","value":"world"}}'
# =============================================================================

services:

  # ── ZooKeeper ────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── CSMR ring membership / URingPaxos topology ───────────────────────────────
  # NOTE: No external zk-init job. Docker Compose has no control plane, but each
  # sidecar now SELF-PROVISIONS its own /csmr/rings/<ringId>/members/<nodeId> entry
  # at startup (PaxosRingNode.provisionCsmrMembership) and the URingPaxos
  # /ringpaxos/topology<N>/acceptors parents (ensureAcceptorsParentExists). This
  # removes the serialized 30-60 s zk-init block and lets all six rings start in
  # parallel. Membership is read by ZooKeeperRingDiscovery from the self-written
  # znodes, so sidecars no longer depend_on an external init container.

  # ── CSMR Control Plane (Operator) ────────────────────────────────────────────
  # Note: Control plane requires Kubernetes API. Disabled in Docker Compose mode.
  # Uncomment and configure kubeconfig if running with Minikube.
  # control-plane:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.control-plane
  #   environment:
  #     ZOOKEEPER_CONNECT: "zookeeper:2181"
  #   volumes:
  #     - ~/.kube/config:/home/csmr/.kube/config  # Mount kubeconfig for Minikube
  #   depends_on:
  #     zookeeper:
  #       condition: service_healthy

  # ── CSMR Proxy ───────────────────────────────────────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.proxy
    ports:
      - "8080:8080"
    environment:
      ZOOKEEPER_CONNECT: "zookeeper:2181"
      # Empty (default) => proxy loads the bundled classpath composition. The E2E
      # test scripts override this env when bringing up the stack so the proxy can
      # load a specific bundled YAML without a host bind-mount:
      #   - Scenario 3/4: /config/composition/full-csmr-composition.yaml
      #   - Chaining PoC: /config/composition/chaining-smr-composition.yaml
      # (Both are baked into the proxy image by docker/Dockerfile.proxy.)
      CSMR_ROUTING_YAML_PATH: "${CSMR_ROUTING_YAML_PATH:-}"
    depends_on:
      zookeeper:
        condition: service_healthy
      sidecar-kvs-0:
        condition: service_healthy
      sidecar-kvs-1:
        condition: service_healthy
      sidecar-kvs-2:
        condition: service_healthy
      sidecar-log-0:
        condition: service_healthy
      sidecar-log-1:
        condition: service_healthy
      sidecar-log-2:
        condition: service_healthy
      # Scenario 3 (Argument Partition) rings — so the proxy only comes up once
      # partitioned_put can reach both kv_store_ring1 and kv_store_ring2.
      sidecar-kvs-ring1-0:
        condition: service_healthy
      sidecar-kvs-ring1-1:
        condition: service_healthy
      sidecar-kvs-ring1-2:
        condition: service_healthy
      sidecar-kvs-ring2-0:
        condition: service_healthy
      sidecar-kvs-ring2-1:
        condition: service_healthy
      sidecar-kvs-ring2-2:
        condition: service_healthy
      # PoC2 Chaining SMRs (init_counter chains prng_service -> counter_service).
      sidecar-prng-0:
        condition: service_healthy
      sidecar-prng-1:
        condition: service_healthy
      sidecar-prng-2:
        condition: service_healthy
      sidecar-counter-0:
        condition: service_healthy
      sidecar-counter-1:
        condition: service_healthy
      sidecar-counter-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── KVS Ring: 3 replicas (app + sidecar each) ─────────────────────────────────
  kvs-0:
    build:
      context: .
      dockerfile: docker/Dockerfile.app-kvs
    environment:
      SERVER_PORT: "8081"
    expose:
      - "8081"

  sidecar-kvs-0:
    build:
      context: .
      dockerfile: docker/Dockerfile.sidecar-paxos
    environment:
      ZOOKEEPER_CONNECT: "zookeeper:2181"
      RING_ID: "kv_store_Put"
      RING_ID_NUMERIC: "1"
      RING_SIZE: "3"
      NODE_ID: "0"
      APP_PORT: "8081"
      APP_HOST: "kvs-0"  # Docker Compose service name for app
      STABLE_STORAGE_TYPE: "InMemory"
      JAVA_TOOL_OPTIONS: "-XX:MaxDirectMemorySize=256m -Xmx512m -Dpaxos.learner.auto_trim=true -Dpaxos.learner.buffer_size=1000"
    ports:
      - "19000:9000"  # Expose sidecar on host port 19000
    expose:
      - "9000"
    # Node 0 registers its acceptor znode FIRST. Coordinator election is driven
    # in-sidecar: PaxosRingNode.startCoordinatorRoleIfElected() polls
    # RingManager.getCoordinatorID() on node 0 and, once node 0 is the elected
    # coordinator id, starts `new CoordinatorRole(rm)` directly. Because node 0
    # registers before any follower, no follower ever transiently sees itself as
    # min(acceptors), so URingPaxos's own notifyNewCoordinator() never spuriously
    # starts a competing CoordinatorRole on node 1/2 — there is exactly one
    # coordinator (node 0). The followers depend_on this service so it wins the race.
    depends_on:
      kvs-0:
        condition: service_started
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/internal/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  kvs-1:
    build:
      context: .
      dockerfile: docker/Dockerfile.app-kvs
    environment:
      SERVER_PORT: "8081"
    expose:
      - "8081"

  sidecar-kvs-1:
    build:
      context: .
      dockerfile: docker/Dockerfile.sidecar-paxos
    environment:
      ZOOKEEPER_CONNECT: "zookeeper:2181"
      RING_ID: "kv_store_Put"
      RING_ID_NUMERIC: "1"
      RING_SIZE: "3"
      NODE_ID: "1"
      APP_PORT: "8081"
      APP_HOST: "kvs-1"
      STABLE_STORAGE_TYPE: "InMemory"
      JAVA_TOOL_OPTIONS: "-XX:MaxDirectMemorySize=256m -Xmx512m -Dpaxos.learner.auto_trim=true -Dpaxos.learner.buffer_size=1000"
    ports:
      - "19001:9000"
    expose:
      - "9000"
    # Follower: registers its acceptor znode AFTER node 0 (depends_on sidecar-kvs-0)
    # so it never transiently becomes min(acceptors) and never starts a competing
    # CoordinatorRole — see the note on sidecar-kvs-0.
    depends_on:
      kvs-1:
        condition: service_started
      sidecar-kvs-0:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/internal/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  kvs-2:
    build:
      context: .
      dockerfile: docker/Dockerfile.app-kvs
    environment:
      SERVER_PORT: "8081"
    expose:
      - "8081"

  sidecar-kvs-2:
    build:
      context: .
      dockerfile: docker/Dockerfile.sidecar-paxos
    environment:
      ZOOKEEPER_CONNECT: "zookeeper:2181"
      RING_ID: "kv_store_Put"
      RING_ID_NUMERIC: "1"
      RING_SIZE: "3"
      NODE_ID: "2"
      APP_PORT: "8081"
      APP_HOST: "kvs-2"
      STABLE_STORAGE_TYPE: "InMemory"
      JAVA_TOOL_OPTIONS: "-XX:MaxDirectMemorySize=256m -Xmx512m -Dpaxos.learner.auto_trim=true -Dpaxos.learner.buffer_size=1000"
    ports:
      - "19002:9000"
    expose:
      - "9000"
    # Follower: registers AFTER node 0 (depends_on sidecar-kvs-0) — see sidecar-kvs-0.
    depends_on:
      kvs-2:
        condition: service_started
      sidecar-kvs-0:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/internal/health"]
