spring.application.name=csmr-proxy
server.port=8080

# ── Health / Actuator (decoupled liveness path) ─────────────────────────────
# Serve Actuator on a DEDICATED management port (8081). Spring Boot runs this as
# a separate Tomcat connector backed by its OWN thread pool, fully isolated from
# the 8080 request path that blocks on the synchronous Paxos fan-out. Kubernetes
# liveness/readiness probes therefore CANNOT be starved of a worker thread by
# request saturation — this is the root-cause fix for the proxy SIGTERM
# (exit 143) restarts observed at 10x load (CONCURRENCY=320).
management.server.port=8081
management.endpoints.web.exposure.include=health
# Process-level status only: composition loaded + JVM alive + disk space.
# Request-path saturation is intentionally NOT a health signal — it must drain.
management.endpoint.health.show-details=when-authorized

# Tomcat HTTP server timeout (match URingPaxos consensus timeout)
server.tomcat.connection-timeout=240000
server.servlet.session.timeout=240s

# ZooKeeper connection (overridden by environment variable ZOOKEEPER_CONNECT)
csmr.zookeeper.connect=${ZOOKEEPER_CONNECT:localhost:2181}

# Composition YAML resolution. Defaults to the classpath resource so the basic
# KVS/Log flows keep working unchanged. Override at runtime (e.g. for the dissertation
# Scenario 3/4 "full" composition or the Chaining PoC) by pointing the proxy at a
# mounted YAML:
#   docker compose: set the proxy's CSMR_ROUTING_YAML_PATH env to an absolute path,
#                    e.g. /config/composition/full-csmr-composition.yaml
#   bare java:      -Dcsmr.routing.yaml-path=/path/to/composition.yaml
# Dispatch timeout per group (seconds) — increased for slow Paxos consensus
csmr.proxy.dispatch-timeout-seconds=200

# Logging
logging.level.br.ufsc.csmr=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Composition routing table location.
# Override at runtime via CSMR_ROUTING_YAML_PATH or -Dcsmr.routing.yaml-path=<path>.
# A plain file path (e.g. /config/composition/full-csmr-composition.yaml) is read from
# disk; the default falls back to the classpath resource. Used by the E2E tests (Scenarios
# 3/4 and Chaining) to repoint the proxy at a different composition without rebuilding.
csmr.routing.yaml-path=${CSMR_ROUTING_YAML_PATH:classpath:csmr-composition.yaml}
