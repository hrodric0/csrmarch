spring.application.name=csmr-sidecar-paxos
server.port=9000

# Tomcat HTTP server timeout (match URingPaxos consensus timeout)
# URingPaxos can take up to 60 seconds for consensus + retries
server.tomcat.connection-timeout=240000
server.servlet.session.timeout=240s

# ZooKeeper connection (overridden by environment variable ZOOKEEPER_CONNECT)
csmr.zookeeper.connect=${ZOOKEEPER_CONNECT:localhost:2181}

# Ring configuration (overridden by environment variables)
csmr.ring.id=${RING_ID:kv_store_Put}
csmr.ring.nodeId=${NODE_ID:0}
csmr.app.host=${APP_HOST:localhost}
csmr.app.port=${APP_PORT:8081}

# Logging
logging.level.br.ufsc.csmr=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.level.ch.usi.da.paxos=WARN
logging.level.org.apache.zookeeper=WARN
